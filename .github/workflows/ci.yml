# =============================================================================
# ApexChainx Contracts — CI Pipeline
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client-checks:
    name: Client Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      # Issue #12: WASM no-std compliance check.
      # Compiles only the library crate for wasm32-unknown-unknown so that any
      # accidental `std` import surfaces here (before deployment) as a compile
      # error. Invokes the wasm32 compiler from the host runner via `cargo check`,
      # which is cheaper than the `Build WASM` step below (metadata only, no codegen).
      - name: WASM no-std compliance check
        working-directory: apexchainx_calculator
        run: |
          cargo check --target wasm32-unknown-unknown --lib 2>&1 | tee no_std_check.log \
            || (echo "=== no_std compliance check failed: std imports are not allowed in WASM ===" \
                && cat no_std_check.log && exit 1)

      - name: Debug environment
        run: |
          echo "=== Rust toolchain ==="
          rustc --version
          cargo --version
          rustup show
          echo "=== Project structure ==="
          ls -la
          ls -la apexchainx_calculator/
          echo "=== Cargo.toml ==="
          cat apexchainx_calculator/Cargo.toml

      - name: Cargo check
        working-directory: apexchainx_calculator
        run: |
          cargo check 2>&1 | tee check.log || (echo "=== Cargo check failed ===" && cat check.log && exit 1)

      - name: Format check
        working-directory: apexchainx_calculator
        run: cargo fmt --check

      - name: Clippy
        working-directory: apexchainx_calculator
        run: cargo clippy --all-targets -- -D warnings

      - name: Unused dependency gate
        working-directory: apexchainx_calculator
        run: |
          cargo install cargo-machete --locked
          cargo install cargo-udeps --locked
          cargo machete
          cargo udeps --all-targets

      - name: Build native
        working-directory: apexchainx_calculator
        run: cargo build

      - name: Build WASM
        working-directory: apexchainx_calculator
        run: cargo build --target wasm32-unknown-unknown

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        working-directory: apexchainx_calculator
        run: cargo test --lib

  # Issue #90 — compile and run tests under the `--release` profile.
  # Catches bugs that only appear under release inlining/DCE (e.g., UB
  # detection, expression reordering, dead-store elimination). Runs in
  # parallel to `e2e-tests` so the added wall-clock cost is bounded.
  e2e-tests-release:
    name: E2E Tests (Release Profile)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo target (release profile)
        uses: actions/cache@v4
        with:
          path: apexchainx_calculator/target
          key: e2e-release-${{ runner.os }}-${{ hashFiles('apexchainx_calculator/Cargo.lock', 'apexchainx_calculator/Cargo.toml') }}
          restore-keys: |
            e2e-release-${{ runner.os }}-

      - name: Run tests in release mode
        working-directory: apexchainx_calculator
        run: cargo test --release --lib

  fuzz-tests:
    name: Fuzz Tests (proptest)
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.1

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apexchainx_calculator/target
          key: fuzz-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            fuzz-${{ runner.os }}-cargo-

      - name: Run property-based fuzz tests
        working-directory: apexchainx_calculator
        run: cargo test --lib fuzz_tests::


  # Issue #82 — Track WASM size history across every CI run.
  # Builds the release WASM, runs `tools/wasm-size.ts` to enforce the
  # 100 KB budget (SC-042) and to append a TSV row to
  # `apexchainx_calculator/.wasm-size.history.txt`, then renders a
  # markdown summary that is uploaded as an artifact and posted as a
  # sticky PR comment (only on pull_request runs).
  wasm-size-history:
    name: WASM Size History
    runs-on: ubuntu-latest

    # `pull-requests: write` is required by `marocchino/sticky-pull-request-comment`
    # to (re)post the wasm-size-history header on the originating PR.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: wasm32-unknown-unknown

      - name: Build WASM release
        working-directory: apexchainx_calculator
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enforce budget + persist history
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: npx --yes tsx tools/wasm-size.ts

      - name: Render markdown summary
        run: npx --yes tsx tools/wasm-size.ts summary > wasm-size-summary.md
        shell: bash

      - name: Show summary
        run: cat wasm-size-summary.md

      - name: Upload trend artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-size-history
          path: |
            wasm-size-summary.md
            apexchainx_calculator/.wasm-size.baseline.txt
            apexchainx_calculator/.wasm-size.history.txt
          retention-days: 365

      - name: Post summary as PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: wasm-size-history
          path: wasm-size-summary.md

  provenance-hashes:
    name: Provenance & Hashes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: wasm32-unknown-unknown

      - name: Build WASM release
        working-directory: apexchainx_calculator
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Generate hash
        run: |
          WASM=target/wasm32-unknown-unknown/release/apexchainx_calculator.wasm
          if [ -f "$WASM" ]; then
            sha256sum "$WASM" | awk '{print $1 "  apexchainx_calculator.wasm"}' > provenance.sha256
            echo "Hash generated successfully"
            cat provenance.sha256
          else
            echo "WASM file not found at $WASM"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-provenance-hash
          path: provenance.sha256
          retention-days: 30
