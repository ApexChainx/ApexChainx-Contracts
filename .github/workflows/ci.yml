# =============================================================================
# ApexChainx Contracts — CI Pipeline
# =============================================================================
#
# Triggered on push/PR to main. Essential checks:
#   1. Formatting  (rustfmt)
#   2. Linting     (clippy)
#   3. Build       (cargo build)
#   4. Tests       (cargo test)
#   5. WASM        (no-std compliance check)
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client-checks:
    name: Client Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: |
          cd apexchainx_calculator
          cargo fmt --check

      - name: Clippy linting
        run: |
          cd apexchainx_calculator
          cargo clippy --all-targets --all-features

      - name: Build
        run: |
          cd apexchainx_calculator
          cargo build

      - name: WASM build check
        run: |
          cd apexchainx_calculator
          cargo build --target wasm32-unknown-unknown

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: |
          cd apexchainx_calculator
          cargo test --lib

  provenance-hashes:
    name: Provenance & Hashes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build WASM for provenance
        run: |
          cd apexchainx_calculator
          cargo build --target wasm32-unknown-unknown --release

      - name: Generate provenance hash
        run: |
          WASM=apexchainx_calculator/target/wasm32-unknown-unknown/release/apexchainx_calculator.wasm
          if [ -f "$WASM" ]; then
            sha256sum "$WASM" | awk '{print $1 "  apexchainx_calculator.wasm"}' > provenance.sha256
            echo "=== Provenance Hash ==="
            cat provenance.sha256
            echo "=== WASM size (bytes) ==="
            wc -c < "$WASM"
          else
            echo "❌ WASM artifact not found at $WASM"
            exit 1
          fi

      - name: Upload provenance artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-provenance-hash
          path: provenance.sha256
          retention-days: 30
