# =============================================================================
# ApexChainx Contracts — Release Artifact Hash Manifest
# =============================================================================
#
# Produces a SHA-256 hash manifest for the release WASM artifact.
# Only runs on version tags (v*), not on every PR/push.
# Optimized with WASM-specific caching for faster rebuilds.
# =============================================================================

name: Release Artifact Hash Manifest

on:
  push:
    tags:
      - 'v*'

jobs:
  hash-manifest:
    name: Build & Hash WASM Artifact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain with wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies (WASM-optimized for release)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apexchainx_calculator
          # WASM release-specific cache key with soroban-sdk version
          key: wasm-release-${{ runner.os }}-wasm32-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('apexchainx_calculator/Cargo.toml') }}-soroban21
          # Comprehensive WASM target cache including std lib for target
          cache-directories: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.rustup/toolchains/*/lib/rustlib/wasm32-unknown-unknown/
            apexchainx_calculator/target/wasm32-unknown-unknown/
          # Save additional cache paths for WASM target dependencies
          save-if: true

      - name: Build release WASM
        run: |
          echo "🔨 Building WASM release artifact..."
          time cargo build --release --manifest-path apexchainx_calculator/Cargo.toml --target wasm32-unknown-unknown
          echo "✅ WASM build completed"

      - name: Generate SHA-256 manifest
        run: |
          WASM=apexchainx_calculator/target/wasm32-unknown-unknown/release/apexchainx_calculator.wasm
          sha256sum "$WASM" | awk '{print $1 "  apexchainx_calculator.wasm"}' > manifest.sha256
          echo "=== manifest.sha256 ==="
          cat manifest.sha256
          echo "=== artifact size (bytes) ==="
          wc -c < "$WASM"

      - name: Verify manifest self-consistency
        run: |
          cp apexchainx_calculator/target/wasm32-unknown-unknown/release/apexchainx_calculator.wasm .
          sha256sum -c manifest.sha256
          rm apexchainx_calculator.wasm

      - name: Upload manifest as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-hash-manifest
          path: |
            manifest.sha256
            apexchainx_calculator/target/wasm32-unknown-unknown/release/apexchainx_calculator.wasm
          retention-days: 90

      - name: Attach manifest to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            manifest.sha256
            apexchainx_calculator/target/wasm32-unknown-unknown/release/apexchainx_calculator.wasm
