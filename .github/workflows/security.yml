# =============================================================================
# ApexChainx Contracts — Security Audit
# =============================================================================
#
# Runs cargo-audit against the RustSec Advisory Database.
# Evaluated on a three-tier schedule:
# - PR-time (catches vulnerabilities before merge)
# - Nightly at 02:00 UTC (fresh advisory sentinel)
# - Weekly Monday 08:00 UTC (baseline catch-all)
# =============================================================================

name: Security Audit

on:
  pull_request:
  schedule:
    - cron: '0 2 * * *'  # Nightly at 02:00 UTC
    - cron: '0 8 * * 1'  # Every Monday 08:00 UTC

jobs:
  audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.1

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2026-0097 --ignore RUSTSEC-2026-0009

  deny:
    name: Dependency Policy (cargo-deny)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny
        run: cargo deny check
